services:
  postgres:
    image: postgres:15-alpine
    container_name: taskflow-postgres
    environment:
      POSTGRES_USER: taskflow
      POSTGRES_PASSWORD: taskflow123
      POSTGRES_DB: taskflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: taskflow-backend
    ports:
      - "5000:5000"

    environment:
      DATABASE_URL: postgresql://taskflow:taskflow123@postgres:5432/taskflow
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: taskflow
      DB_PASSWORD: taskflow123
      DB_NAME: taskflow

      NODE_ENV: development

      JWT_SECRET: your_super_secret_jwt_key_minimum_32_characters_long_here_change_this
      JWT_REFRESH_SECRET: your_super_secret_refresh_key_minimum_32_characters_long_change_this

      JWT_EXPIRY: 15m
      JWT_REFRESH_EXPIRY: 7d

      CORS_ORIGIN: http://localhost:5173

    depends_on:
      postgres:
        condition: service_healthy

    command: node server.js

  frontend:
    build: ./frontend
    container_name: taskflow-frontend
    ports:
      - "5173:3000"

    environment:
      VITE_API_URL: http://localhost:5000

    depends_on:
      - backend

volumes:
  postgres_data: